networks:
  net:
    driver: bridge

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "${QDRANT_GRPC_PORT:-6334}:6334"
      - "${QDRANT_REST_PORT:-6333}:6333"
    networks:
      - net
    volumes:
      - ./qdrant_config.yaml:/qdrant/config/config.yaml:ro
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6334/readyz"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  qdrant_data: