<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Text to embeddings convertor</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <h1>Text to embeddings convertor</h1>
        
        <form id="form">
            <div class="row">
                <div class="field">
                    <label>Text:</label>
                    <textarea id="original-text" placeholder="Type your text"></textarea>
                </div>

                <div class="field">
                    <label>Embeddings:</label>
                    <textarea id="embedded-text" placeholder="" readonly></textarea>
                </div>
            </div>
            <button type="submit">Send</button>
        </form>

        <script src="script.js" type="module"></script>
    </body>
</html>
